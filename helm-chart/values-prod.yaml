# Default values for post-processor.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

image:
  repository: 548054532197.dkr.ecr.eu-north-1.amazonaws.com/performax/perfomax-be
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets:
  - name: aws-ecr-secret
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: be.perfomax.io
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
   - secretName: backend-tls-secret
     hosts:
       - be.perfomax.io

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 1000m   # 2 vCPUs
    memory: 2Gi  # 4 GiB of memory
  requests:
    cpu: 1000m   # 1.5 vCPUs
    memory: 1Gi  # 3 GiB of memory

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

database:
  connection: postgresql
  url: perfomax-prod-eu-north-1-postgresql.cu9vsryynrq9.eu-north-1.rds.amazonaws.com
  port: 5432
  name: perfomax

auth:
  accessTokenExpireMinutes: 30
  refreshTokenExpireDays: 7
  algorithm: HS256

fastapi:
  origins: "https://stage.perfomax.io, http://localhost:3000, https://live.perfomax.io"

reports:
  output_path: ./src/reports/output
  template_path: ./src/reports/templates
  temp_path: ./src/temp
  daily_report: daily_report.xlsx

aws:
  bucket_name: perfomax-prod-eu-north-1-admin-server
  region_name: eu-north-1
  media_file_path: media

env:
  name: prod

secrets:
  - DB_USERNAME
  - DB_PASSWORD
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - API_TOKEN
  - SECRET_KEY
